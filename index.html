<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Farm 640358 · Verifier</title>
<style>
:root{--bg:#0b0f13;--bg2:#11161d;--bg3:#161b22;--bdr:#21262d;--tx:#e6edf3;--tx2:#8b949e;--red:#f85149;--blu:#58a6ff}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--tx);font-family:system-ui,sans-serif}
.top{height:40px;background:#0d5a22;display:flex;align-items:center;padding:0 12px;gap:10px;color:#fff;font-weight:700}
.ctrls{padding:8px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;gap:8px}
.btn{background:var(--bg3);color:var(--tx);border:1px solid var(--bdr);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.main{display:flex;height:calc(100vh - 40px - 40px)}
#map{flex:1;height:100%;min-height:0}
.mapwrap{position:relative;flex:1;min-height:0}
.side table{width:100%;border-collapse:collapse;font-size:12px}
.side th{position:sticky;top:0;background:var(--bg3);text-align:left;padding:6px;border-bottom:1px solid var(--bdr);color:var(--tx2)}
.side td{padding:5px 6px;border-bottom:1px solid var(--bdr);color:var(--tx2)}
.side tr:hover td{background:rgba(255,255,255,.03)}
.eb{width:24px;height:24px;background:var(--bg3);border:1px solid var(--bdr);border-radius:4px;cursor:pointer;color:var(--tx);font-size:11px}
.eb:hover{border-color:#484f58}
.bdg{display:inline-block;padding:2px 6px;border-radius:999px;font-size:10px;font-weight:800}
.bdg.ok{color:#3fb950;border:1px solid rgba(46,160,67,.4)}
.bdg.wn{color:#e3b341;border:1px solid rgba(210,153,34,.4)}
.bdg.er{color:#ff6b63;border:1px solid rgba(248,81,73,.4)}
.pin{position:absolute;top:8px;left:8px;background:rgba(11,15,19,.85);padding:6px 10px;border-radius:6px;border:1px solid var(--bdr);color:var(--tx);font-size:11px;z-index:999}
</style>
<link rel="stylesheet" href="lib/leaflet.css">
</head>
<body>
<div class="top"><span>Farm 640358</span><span style="color:#cde8d7;font-weight:400;font-size:11px">· Manual verifier</span></div>
<div class="ctrls">
  <button class="btn" onclick="document.getElementById('f').click()">📥 Import CSV</button>
  <input type="file" id="f" accept=".csv" onchange="importCSV(event)">
  <button class="btn" onclick="resetAll()">Reset</button>
  <button class="btn" onclick="exportCSV()">Export</button>
</div>
<div class="main">
  <div class="mapwrap"><div class="pin" id="pin">Idle – click row, then Edit, then map</div><div id="map"></div></div>
  <div class="side"><table><thead><tr><th>ID</th><th>Orig</th><th>Corrected</th><th>Dist</th><th>Action</th></tr></thead><tbody id="tbl"></tbody></table></div>
</div>
<script src="lib/leaflet.js"></script>
<script>
const TURBINES=[
{"id":"6403580001","lat":37.3733,"lon":106.4133},
{"id":"6403580002","lat":37.3700,"lon":106.4058},
{"id":"6403580003","lat":37.3700,"lon":106.3811},

{"id":"6403580055","lat":37.4389,"lon":106.3928}
];
let map,mLayer,dLayer,list;
let editId=null;
const KEY='gw640358_v1';
function dist(a,b,c,d){const R=6371000;const toR=x=>x*Math.PI/180;const dLat=toR(c-a);const dLon=toR(d-b);const x=Math.sin(dLat/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function status(d){if(!d&&d!==0)return'wn';if(d<20)return'ok';if(d<100)return'wn';return'er'}
function init(){
  if(map)return;
  map=L.map('map').setView([37.39,106.38],11);
  mLayer=L.layerGroup().addTo(map);
  dLayer=L.layerGroup().addTo(map);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map);
  map.on('click',onMapClick);
}
function onMapClick(e){
  if(!editId)return;
  const t=list.find(x=>x.id===editId);
  if(!t)return;
  const lat=e.latlng.lat;const lon=e.latlng.lng;
  const d=dist(t.lat,t.lon,lat,lon);
  t.rlat=lat;t.rlon=lon;t.dist=d;
  dLayer.clearLayers();
  L.circleMarker([lat,lon],{radius:8,color:'#f85149',fillColor:'#f85149',fillOpacity:.9,weight:3}).addTo(dLayer);
  L.polyline([[t.lat,t.lon],[lat,lon]],{color:'#d29922',weight:2,dashArray:'5 4'}).addTo(dLayer);
  save();render();buildTable();
  document.getElementById('pin').textContent='Corrected '+t.id+' — '+Math.round(d)+' m';
  editId=null;
}
function startOK(id){
  const t=list.find(x=>x.id===id);
  if(!t)return;
  t.rlat=t.lat;t.rlon=t.lon;t.dist=0;
  save();render();buildTable();
}
function render(){
  if(!mLayer)return;
  mLayer.clearLayers();dLayer.clearLayers();
  list.forEach(t=>{
    const lat=t.rlat||t.lat;const lon=t.rlon||t.lon;
    const c=t.rlat!==undefined?'#f85149':'#58a6ff';
    L.circleMarker([lat,lon],{radius:6,color:c,fillColor:c,fillOpacity:.85,weight:2,interactive:false}).addTo(mLayer);
    if(t.rlat!==undefined){
      L.circleMarker([t.rlat,t.rlon],{radius:9,color:'#f85149',fillColor:'#f85149',fillOpacity:.9,weight:3}).addTo(dLayer);
      L.polyline([[t.lat,t.lon],[t.rlat,t.rlon]],{color:'#d29922',weight:2,dashArray:'5 4'}).addTo(dLayer);
    }
    const el=document.getElementById('d_'+t.id);
    if(el){const s=status(t.dist);el.className='bdg '+s;el.textContent=t.dist===undefined?' - ':Math.round(t.dist)+'m'}
  });
}
function buildTable(){
  const tb=document.getElementById('tbl');tb.innerHTML='';
  list.forEach(t=>{
    const tr=document.createElement('tr');tr.id='r_'+t.id;
    tr.innerHTML='<td style="font:10px SF Mono,monospace">'+t.id+'</td><td style="font:10px SF Mono,monospace">'+t.lat.toFixed(6)+', '+t.lon.toFixed(6)+'</td><td style="font:10px SF Mono,monospace">'+(t.rlat!==undefined?t.rlat.toFixed(6)+', '+t.rlon.toFixed(6):' - ')+'</td><td><span class="bdg" id="d_'+t.id+'"> - </span></td><td><button class="eb" id="b_'+t.id+'">✏️</button><button class="eb" id="o_'+t.id+'" style="margin-left:4px">OK</button></td>';
    tr.onclick=()=>locate(t.id);
    tb.appendChild(tr);
    document.getElementById('b_'+t.id).onclick=(e)=>{e.stopPropagation();startEdit(t.id)};
    document.getElementById('o_'+t.id).onclick=(e)=>{e.stopPropagation();startOK(t.id)};
  });
}
function locate(id){const t=list.find(x=>x.id===id);if(!t)return;map.flyTo([t.lat,t.lon],17);document.getElementById('pin').textContent='Original: '+id}
function startEdit(id){
  editId=id;
  const t=list.find(x=>x.id===id);
  if(!t)return;
  map.flyTo([t.lat,t.lon],17);
  document.getElementById('pin').textContent='Click map at actual turbine: '+id;
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(list.map(t=>({id:t.id,rlat:t.rlat,rlon:t.rlon,dist:t.dist}))))}catch(e){}}
function load(){try{const s=localStorage.getItem(KEY);if(!s)return;JSON.parse(s).forEach(x=>{const t=list.find(y=>y.id===x.id);if(t){t.rlat=x.rlat;t.rlon=x.rlon;t.dist=x.dist}})}catch(e){}}
function resetAll(){if(!confirm('Reset all?'))return;list=JSON.parse(JSON.stringify(TURBINES));save();buildTable();render()}
function exportCSV(){let csv='id,orig_lat,orig_lon,corr_lat,corr_lon,dist_m,status\n';list.forEach(t=>{const lat=t.rlat!==undefined?t.rlat:t.lat;const lon=t.rlon!==undefined?t.rlon:t.lon;const d=t.dist!==undefined?Math.round(t.dist):0;csv+=t.id+','+t.lat+','+t.lon+','+lat+','+lon+','+d+','+status(d)+'\n'});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='GW640358.csv';a.click()}
function importCSV(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const lines=e.target.result.split(/\r?\n/).filter(Boolean);if(lines.length<2)return;const hdr=lines[0].split(',');let n=0;for(let i=1;i<lines.length;i++){const c=lines[i].split(',');const row={};hdr.forEach((h,j)=>row[h.trim()]=c[j]?c[j].trim():'');const id=(row.wtid||row.id||row.turbine_id||'');if(!id)continue;const t=list.find(x=>x.id===id);if(!t)continue;const clat=parseFloat(row.lat_corrected||row.corrected_lat||row.lat||row.latitude);const clon=parseFloat(row.lon_corrected||row.corrected_lon||row.lon||row.longitude);const dst=parseFloat(row.distance_m||row.deviation_m||row.dist);if(!isNaN(clat))t.rlat=clat;if(!isNaN(clon))t.rlon=clon;if(!isNaN(dst))t.dist=dst;n++}save();buildTable();render()};r.readAsText(f)}
document.addEventListener('DOMContentLoaded',()=>{list=JSON.parse(JSON.stringify(TURBINES));init();load();buildTable();render();document.getElementById('pin').textContent='Farm 640358 ready — '+list.length+' turbines'});
</script>
</body>
</html>
