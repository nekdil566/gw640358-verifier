<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Farm 640358 · Manual Coordinate Verifier</title>
<style>
:root{--bg:#0b0f13;--bg2:#11161d;--bg3:#161b22;--bdr:#21262d;--tx:#e6edf3;--tx2:#8b949e;--grn:#2ea043;--ylw:#d29922;--red:#f85149;--blu:#58a6ff}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
.wrap{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:42px;background:#0d5a22;display:flex;align-items:center;padding:0 12px;gap:10px}
.topbar b{color:#fff;font-size:14px}
.topbar .sub{color:#cde8d7;font-size:11px}
.main{flex:1;display:flex;flex-direction:column;min-height:0}
.ctrls{display:flex;gap:6px;padding:8px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-wrap:wrap;align-items:center}
.btn{background:var(--bg3);color:var(--tx);border:1px solid var(--bdr);padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer}
.btn:hover{border-color:#484f58}
.maparea{flex:1;display:flex;position:relative;min-height:0}
#map{flex:1}
.side{width:280px;background:var(--bg2);border-left:1px solid var(--bdr);display:flex;flex-direction:column;min-height:0}
.side .bar{height:32px;background:var(--bg3);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 10px;justify-content:space-between;font-size:12px;font-weight:700}
.rows{flex:1;overflow:auto;padding:0}
table{width:100%;border-collapse:collapse;font-size:12px}
th{position:sticky;top:0;background:var(--bg3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--bdr);color:var(--tx2);font-weight:600}
td{padding:5px 8px;border-bottom:1px solid var(--bdr);color:var(--tx2);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.03)}
.ib{width:26px;height:26px;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.ib:hover{border-color:#484f58}
.bdg{display:inline-block;padding:2px 6px;border-radius:999px;font-size:10px;font-weight:800}
.bdg.ok{background:rgba(46,160,67,.15);color:#3fb950;border:1px solid rgba(46,160,67,.3)}
.bdg.wn{background:rgba(210,153,34,.12);color:#e3b341;border:1px solid rgba(210,153,34,.3)}
.bdg.er{background:rgba(248,81,73,.12);color:#ff6b63;border:1px solid rgba(248,81,73,.3)}
input[type=file]{display:none}
.mappin{background:rgba(13,17,23,.8);padding:6px 10px;border-radius:6px;border:1px solid var(--bdr);color:var(--tx);font-size:11px;position:absolute;top:8px;left:8px;z-index:999}
</style>
<link rel="stylesheet" href="lib/leaflet.css">
</head>
<body>
<div class="wrap">
  <div class="topbar"><b>Farm 640358</b><span class="sub">Manual coordinate verifier</span></div>
  <div class="main">
    <div class="ctrls">
      <button class="btn" onclick="document.getElementById('f').click()">Import CSV</button>
      <input type="file" id="f" accept=".csv" onchange="importCSV(event)">
      <button class="btn" onclick="resetAll()">Reset</button>
      <button class="btn" onclick="exportCSV()">Export</button>
      <button class="btn" onclick="startAuto()">Auto-check all</button>
    </div>
    <div class="maparea">
      <div class="mappin" id="pin">Idle - click row to locate, pencil to correct</div>
      <div id="map"></div>
      <div class="side">
        <div class="bar"><span>Activity log</span><span id="lc">0</span></div>
        <div class="rows" id="log" style="padding:8px;height:120px;overflow:auto;font:11px SF Mono,Monaco,monospace;color:var(--tx2);background:var(--bg)"></div>
        <div class="bar" style="margin-top:auto"><span>Turbines</span></div>
        <div class="rows" id="tblw" style="max-height:50%;overflow:auto"></div>
      </div>
    </div>
  </div>
</div>
<script src="lib/leaflet.js"></script>
<script>
const FARM='640358';
const TURBINES=[{"id":"6403580001","lat":37.3733,"lon":106.4133},{"id":"6403580002","lat":37.3700,"lon":106.4058},{"id":"6403580003","lat":37.3700,"lon":106.3811},{"id":"6403580004","lat":37.3789,"lon":106.3736},{"id":"6403580005","lat":37.3886,"lon":106.3653},{"id":"6403580006","lat":37.3972,"lon":106.3594},{"id":"6403580007","lat":37.4061,"lon":106.3544},{"id":"6403580008","lat":37.4150,"lon":106.3508},{"id":"6403580009","lat":37.4236,"lon":106.3486},{"id":"6403580010","lat":37.4322,"lon":106.3478},{"id":"6403580011","lat":37.3786,"lon":106.4281},{"id":"6403580012","lat":37.3769,"lon":106.4197},{"id":"6403580013","lat":37.3753,"lon":106.4047},{"id":"6403580014","lat":37.3736,"lon":106.3892},{"id":"6403580015","lat":37.3731,"lon":106.3750},{"id":"6403580016","lat":37.3750,"lon":106.3603},{"id":"6403580017","lat":37.3806,"lon":106.3467},{"id":"6403580018","lat":37.3886,"lon":106.3347},{"id":"6403580019","lat":37.4181,"lon":106.4317},{"id":"6403580020","lat":37.4233,"lon":106.4261},{"id":"6403580021","lat":37.3811,"lon":106.4406},{"id":"6403580022","lat":37.3844,"lon":106.4378},{"id":"6403580023","lat":37.3900,"lon":106.4350},{"id":"6403580024","lat":37.3961,"lon":106.4322},{"id":"6403580025","lat":37.4025,"lon":106.4292},{"id":"6403580026","lat":37.4092,"lon":106.4239},{"id":"6403580027","lat":37.4089,"lon":106.4125},{"id":"6403580028","lat":37.4075,"lon":106.4011},{"id":"6403580029","lat":37.4056,"lon":106.3897},{"id":"6403580030","lat":37.4044,"lon":106.3781},{"id":"6403580031","lat":37.4036,"lon":106.3667},{"id":"6403580032","lat":37.4069,"lon":106.3558},{"id":"6403580033","lat":37.4136,"lon":106.3461},{"id":"6403580034","lat":37.4472,"lon":106.4078},{"id":"6403580035","lat":37.4492,"lon":106.3953},{"id":"6403580036","lat":37.4492,"lon":106.3828},{"id":"6403580037","lat":37.4478,"lon":106.3703},{"id":"6403580038","lat":37.4456,"lon":106.3578},{"id":"6403580039","lat":37.4428,"lon":106.3450},{"id":"6403580040","lat":37.4386,"lon":106.3331},{"id":"6403580041","lat":37.4344,"lon":106.3214},{"id":"6403580042","lat":37.3894,"lon":106.4150},{"id":"6403580043","lat":37.3864,"lon":106.4125},{"id":"6403580044","lat":37.3847,"lon":106.4058},{"id":"6403580045","lat":37.3744,"lon":106.3983},{"id":"6403580046","lat":37.3697,"lon":106.3892},{"id":"6403580047","lat":37.4000,"lon":106.4239},{"id":"6403580048","lat":37.3908,"lon":106.4353},{"id":"6403580049","lat":37.4081,"lon":106.4394},{"id":"6403580050","lat":37.4253,"lon":106.3342},{"id":"6403580051","lat":37.4267,"lon":106.3236},{"id":"6403580052","lat":37.4050,"lon":106.4483},{"id":"6403580053","lat":37.3972,"lon":106.4497},{"id":"6403580054","lat":37.3875,"lon":106.4472},{"id":"6403580055","lat":37.4389,"lon":106.3928}];
let map,markers,markLayer,dotLayer;
let list=JSON.parse(JSON.stringify(TURBINES));
let edId=null;
const KEY='gw640358_manual';
function log(a,b){const d=new Date().toLocaleTimeString();const el=document.getElementById('log');el.innerHTML='<div>'+d+' <b>['+a+']</b> '+b+'</div>'+el.innerHTML;document.getElementById('lc').textContent=el.children.length}
function dist(a,b,c,d){const R=6371000;const toR=x=>x*Math.PI/180;const dLat=toR(c-a);const dLon=toR(d-b);const x=Math.sin(dLat/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function status(d){if(!d&&d!==0)return'wn';if(d<20)return'ok';if(d<100)return'wn';return'er'}
function initMap(){if(map)return;map=L.map('map',{preferCanvas:true}).setView([37.39,106.38],12);markLayer=L.layerGroup().addTo(map);dotLayer=L.layerGroup().addTo(map);const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19});sat.addTo(map);markers={}}
function render(){if(!markLayer)return;markLayer.clearLayers();dotLayer.clearLayers();list.forEach(t=>{const row=document.getElementById('r_'+t.id);if(!row)return;const d=t.refDist;const s=status(d);const c=t.refLat!==undefined?'#f85149':'#58a6ff';const lat=t.refLat||t.lat;const lon=t.refLon||t.lon;L.circleMarker([lat,lon],{radius:6,color:c,fillColor:c,fillOpacity:.85,weight:2,interactive:false,bubblingMouseEvents:false}).addTo(markLayer);if(t.refLat!==undefined){L.circleMarker([t.refLat,t.refLon],{radius:9,color:'#f85149',fillColor:'#f85149',fillOpacity:.9,weight:3,interactive:false,bubblingMouseEvents:false}).addTo(dotLayer);L.polyline([[t.lat,t.lon],[t.refLat,t.refLon]],{color:'#d29922',weight:2,dashArray:'5 4'}).addTo(dotLayer)};const out=document.getElementById('dist_'+t.id);if(out){out.className='bdg '+s;out.textContent=d===undefined?' - ':Math.round(d)+'m'}})}
function buildTable(){const w=document.getElementById('tblw');w.innerHTML='<table><thead><tr><th>ID</th><th>Original</th><th>Corrected</th><th>Dist</th><th>Action</th></tr></thead><tbody id="tbl"></tbody></table>';const tb=document.getElementById('tbl');list.forEach(t=>{const tr=document.createElement('tr');tr.id='r_'+t.id;tr.innerHTML='<td style="font:10px SF Mono,Monaco,monospace;color:var(--tx2)">'+t.id+'</td><td style="font:10px SF Mono,Monaco,monospace;color:var(--tx2)">'+t.lat.toFixed(6)+', '+t.lon.toFixed(6)+'</td><td style="font:10px SF Mono,Monaco,monospace;color:var(--tx2)">'+(t.refLat!==undefined?t.refLat.toFixed(6)+', '+t.refLon.toFixed(6):' - ')+'</td><td><span class="bdg" id="dist_'+t.id+'"> - </span></td><td><button class="ib" title="Correct" id="btn_'+t.id+'">Edit</button></td>';tr.onclick=()=>locate(t.id);tb.appendChild(tr);const run=()=>startEdit(t.id);document.getElementById('btn_'+t.id).addEventListener('click',e=>{e.stopPropagation();run()})})}
function locate(id){const t=list.find(x=>x.id===id);if(!t)return;map.flyTo([t.lat,t.lon],18);document.getElementById('pin').textContent='Original: '+id}
function startEdit(id){edId=id;const t=list.find(x=>x.id===id);if(!t)return;map.flyTo([t.lat,t.lon],18);document.getElementById('pin').textContent='Click map at actual turbine position: '+id;document.getElementById('map').style.cursor='crosshair';log('Edit','Correction started '+id)}
function save(){try{localStorage.setItem(KEY,JSON.stringify(list.map(t=>({id:t.id,refLat:t.refLat,refLon:t.refLon,refDist:t.refDist}))))}catch(e){}}
function load(){try{const s=localStorage.getItem(KEY);if(!s)return;const j=JSON.parse(s);j.forEach(x=>{const t=list.find(y=>y.id===x.id);if(t){t.refLat=x.refLat;t.refLon=x.refLon;t.refDist=x.refDist}})}catch(e){}}
function resetAll(){if(!confirm('Reset all corrections?'))return;list=JSON.parse(JSON.stringify(TURBINES));save();buildTable();render();log('Reset','All corrections cleared')}
function exportCSV(){let csv='id,original_lat,original_lon,corrected_lat,corrected_lon,deviation_m,status\n';list.forEach(t=>{const lat=t.refLat!==undefined?t.refLat:t.lat;const lon=t.refLon!==undefined?t.refLon:t.lon;const d=t.refDist!==undefined?Math.round(t.refDist):0;const s=status(d);csv+=t.id+','+t.lat+','+t.lon+','+lat+','+lon+','+d+','+s+'\n'});const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='GW640358-manual-'+Date.now()+'.csv';a.click();log('Export','Saved corrected coordinates')}
function importCSV(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const raw=e.target.result.replace(/\uFEFF/g,'');const lines=raw.split(/\r?\n/).filter(Boolean);if(lines.length<2)return;const hdr=lines[0].split(',').map(s=>s.trim().replace(/^"|"$/g,''));let n=0;for(let i=1;i<lines.length;i++){const c=lines[i].split(',').map(s=>s.trim().replace(/^"|"$/g,''));const row={};hdr.forEach((h,j)=>row[h]=c[j]);const id=(row.wtid||row.id||row.turbine_id||'').trim();if(!id)continue;const t=list.find(x=>x.id===id);if(!t)continue;const clat=parseFloat(row.lat_corrected||row.corrected_lat||row.lat_original||row.lat);const clon=parseFloat(row.lon_corrected||row.corrected_lon||row.lon_original||row.lon);const dst=parseFloat(row.distance_m||row.deviation_m||row.dist);if(!isNaN(clat))t.refLat=clat;if(!isNaN(clon))t.refLon=clon;if(!isNaN(dst))t.refDist=dst;n++}save();buildTable();render();log('Import','Loaded '+n+' turbines')};r.readAsText(f)}
function startAuto(){if(!confirm('Start sequential auto-check from first turbine?'))return;let i=0;function step(){if(i>=list.length){log('Auto','Complete');return}const t=list[i];locate(t.id);log('Auto','Checking '+(i+1)+'/'+list.length);edId=t.id;i++;setTimeout(step,2500)}step()}
window.addEventListener('DOMContentLoaded',()=>{initMap();load();buildTable();render();const mapEl=document.getElementById('map');if(mapEl){mapEl.addEventListener('click',e=>{if(!edId)return;const t=list.find(x=>x.id===edId);if(!t)return;const lat=e.latlng.lat,lon=e.latlng.lng;const d=dist(t.lat,t.lon,lat,lon);t.refLat=lat;t.refLon=lon;t.refDist=d;const pin=document.getElementById('pin');if(pin)pin.textContent='Corrected '+t.id+' - '+Math.round(d)+' m';log('Correct',t.id+' moved '+Math.round(d)+' m');save();render();edId=null;mapEl.style.cursor=''})}log('System','Farm '+FARM+' ready with '+list.length+' turbines');log('Tip','Click row to locate - pencil to correct - map click saves')});
</script>
</body>
</html>
